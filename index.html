<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影响力</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">
    <div id="app" class="w-full max-w-2xl">
        
        <div id="welcome-screen" class="nude-card p-12 md:p-20 text-center fade-in">
            <div class="mb-8 opacity-50 text-[10px] tracking-[0.5em] uppercase">Human Relations Mastery</div>
            <h1 class="text-4xl md:text-5xl font-bold mb-8 text-nude-primary serif leading-tight">影响力</h1>
            <p class="text-nude-text-muted mb-12 text-sm md:text-base leading-loose max-w-md mx-auto">
                
            </p>
            <button onclick="showChapterTransition(0)" class="btn-action w-full py-6 rounded-3xl font-medium text-sm">
                进入深度测试
            </button>
        </div>

        <div id="calibration-screen" class="nude-card p-10 md:p-14 hidden fade-in">
            <button onclick="goBack()" class="btn-back">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="flex justify-between items-center mb-12 pt-4">
                <span class="text-[10px] font-bold text-stone-400 tracking-widest uppercase ml-8">预备测验：本能反应</span>
            </div>
            <h2 id="calib-question" class="text-2xl serif mb-12 leading-snug"></h2>
            <div id="calib-options" class="space-y-4"></div>
        </div>

        <div id="chapter-transition" class="nude-card p-12 md:p-20 hidden fade-in text-center">
            <button onclick="goBack()" class="btn-back">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div id="trans-badge" class="inline-block px-4 py-1 rounded-full border border-nude-highlight text-nude-highlight text-[10px] tracking-widest uppercase mb-6 mt-4"></div>
            <h2 id="trans-title" class="text-3xl serif mb-8 text-nude-primary"></h2>
            <div class="h-px w-12 bg-nude-accent mx-auto mb-8"></div>
            <p id="trans-story" class="text-stone-500 text-sm leading-loose italic mb-10 text-left md:text-center"></p>
            <div id="trans-outline" class="text-left bg-stone-50 p-6 rounded-2xl mb-12 space-y-3"></div>
            <button id="trans-btn" class="btn-action w-full py-5 rounded-2xl text-xs uppercase">开始本章</button>
        </div>

        <div id="game-screen" class="nude-card p-10 md:p-16 hidden">
            <button onclick="goBack()" class="btn-back">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="flex justify-between items-center mb-10 pt-4">
                <div class="flex flex-col gap-1 ml-8">
                    <span id="dimension-indicator" class="text-[10px] text-nude-highlight font-bold uppercase tracking-widest"></span>
                    <div id="chapter-label" class="text-[9px] text-stone-400"></div>
                </div>
                <div class="text-nude-highlight serif italic" id="game-progress"></div>
            </div>

            <div class="mb-10">
                <div id="book-quote" class="quote-box mb-8 text-xs italic text-stone-400"></div>
                <h3 id="scene-title" class="text-xl font-bold mb-6 serif text-nude-primary"></h3>
                <div class="bg-stone-50 p-6 rounded-3xl border border-stone-100 mb-6">
                    <p id="scenario-text" class="text-sm md:text-base leading-relaxed text-stone-600"></p>
                </div>
            </div>

            <div id="options-container" class="space-y-4 mb-10"></div>

            <!-- 修改后的反馈弹窗结构 -->
<div id="feedback-area" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
    <!-- 背景遮罩 -->
    <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-sm"></div>
    
    <!-- 弹窗主体 -->
    <div class="nude-card w-full max-w-lg relative z-10 fade-in shadow-2xl p-8 md:p-10">
        <div id="feedback-label" class="text-[10px] font-bold px-3 py-1 bg-stone-100 text-stone-500 rounded uppercase w-fit mb-4"></div>
        
        <div class="max-h-[60vh] overflow-y-auto pr-2 mb-8">
            <p id="feedback-content" class="text-sm md:text-base text-stone-600 leading-loose mb-6"></p>
            <div class="p-5 bg-stone-50 rounded-2xl border border-nude-accent/20">
                <p class="text-[10px] text-nude-highlight font-bold mb-2 uppercase tracking-widest">原著深度解析：</p>
                <p id="persona-analysis" class="text-xs md:text-sm text-stone-400 leading-relaxed italic"></p>
            </div>
        </div>
        

        
        <!-- 在 feedback-area 的按钮部分修改如下 -->
<div class="flex gap-3 mt-6">
    <!-- 返回重选按钮 -->
    <button onclick="handleBackToChoice()" class="flex-1 py-4 rounded-2xl text-[10px] uppercase tracking-widest border border-stone-200 text-stone-400 hover:bg-stone-50 transition-colors">
        返回重选
    </button>
    
    <!-- 继续修行按钮 -->
    <button onclick="handleNextClick()" class="flex-[2] btn-action py-4 rounded-2xl text-[10px] uppercase tracking-widest">
        理解了，继续修行
    </button>
</div>
    </div>
</div>
        </div>

        <div id="end-screen" class="nude-card p-12 hidden fade-in">
            <button onclick="goBack()" class="btn-back">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="text-center mb-12">
                <h2 class="text-3xl serif text-nude-primary mb-2">社交人格深度报告</h2>
                <p class="text-[10px] text-stone-400 tracking-widest uppercase">Psychological Analysis Result</p>
            </div>
            <div id="result-summary" class="space-y-6"></div>
            
        </div>


        <!-- 历史记录页面 -->
<div id="history-screen" class="screen hidden">
    <div id="history-list-container" class="max-w-md mx-auto px-6 pb-20">
        <!-- 动态注入的内容会在这里 -->
    </div>
</div>
    </div>

<!-- 在 index.html 底部修改为 -->
<script src="data.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
